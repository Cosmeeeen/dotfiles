# Minimal, friendly tmux. Sane defaults; standard C-b prefix kept for familiarity.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"   # truecolor
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
setw -g mode-keys vi
set -g status-keys emacs

# reload + splits that keep the current directory
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# gruvbox-tinted status — plain text, no Nerd Font
set -g status-style "bg=default,fg=#a89984"
set -g status-left "#[fg=#1d2021,bg=#fabd2f,bold] #S #[bg=default,fg=#665c54] "
set -g status-left-length 30
set -g status-right "#[fg=#83a598]#H #[fg=#665c54]| #[fg=#a89984]%Y-%m-%d %H:%M "
set -g window-status-current-format "#[fg=#fabd2f,bold]#I:#W "
set -g window-status-format "#[fg=#665c54]#I:#W "
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fabd2f"
set -g message-style "bg=#fabd2f,fg=#1d2021"
